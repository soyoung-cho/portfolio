<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="CSS/contact.css">

    <!-- emailJS cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    
    <footer>
        <form id="contact-form" class="contact-box">
            <div class="form-align">
                <div class="input-box">
                    <label for="company">회사명</label>
                    <input type="text" id="company" name="company" required placeholder="company name">
                </div>
                <div class="input-box">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="name">
                </div>
            </div>
            <div class="form-align">
                <div class="input-box">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required placeholder="e-mail">
                </div>
                <div class="input-box">
                    <label for="phone">연락처</label>
                    <input type="number" id="phone" name="phone" required placeholder="phone number">
                </div>
            </div>
            <div class="message-box">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" placeholder="프로젝트에 대해 알려주세요." required></textarea>
            </div>
            <div class="send-btn">
                <button type="submit">Send</button>
            </div>
        </form>

    </footer>

    <script src="js/email.js"></script>


</body>
</html>
